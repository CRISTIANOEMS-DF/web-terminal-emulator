<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebConsole Terminal</title>

    <script>
      // Auto-redirect from Live Server to PHP server
      (function () {
        const port = window.location.port;
        if (port === "5500" || port === "5501") {
          window.location.replace("http://localhost:8000/FRONTEND/terminal.html" + window.location.search);
        }
      })();

      // ── Detect isolated environment (?user=xxx&session=N) ──────────────────
      const _urlParams   = new URLSearchParams(window.location.search);
      const _sessionUser = _urlParams.get("user");
      const _sessionId   = _urlParams.get("session");
      const _isIsolated  = !!(_sessionUser && _sessionId);

      // Each isolated session gets its own localStorage namespace
      // so it NEVER touches the main terminal's data
      if (_isIsolated) {
        window.__TERMINAL_STORAGE_KEY__  = `ConsoleDatabase_Env_${_sessionUser}_${_sessionId}`;
        window.__TERMINAL_SESSION_USER__ = _sessionUser;
        window.__TERMINAL_SESSION_ID__   = _sessionId;
        document.title = `Terminal — ${_sessionUser}`;
      }
    </script>

    <link rel="stylesheet" href="../BACKEND/CSS/terminal.css" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #000;
        height: 100vh;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
      }
      #terminal-container {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="terminal-container"></div>

    <script src="../BACKEND/CSS/console.theme.js"></script>
    <script src="../BACKEND/CSS/console.table.js"></script>
    <script src="../BACKEND/CSS/console.renderer.js"></script>
    <script src="../BACKEND/CSS/console.keyboard.js"></script>
    <script src="../BACKEND/CORE/console.parser.js"></script>
    <script src="../BACKEND/CORE/console.history.js"></script>
    <script src="../BACKEND/JS/COMMANDS/console.registry.js"></script>
    <script src="../BACKEND/JS/COMMANDS/console.database.js"></script>
    <script src="../BACKEND/JS/COMMANDS/console.commands.js"></script>
    <script src="../BACKEND/JS/COMMANDS/console.builtins.js"></script>
    <script src="../BACKEND/CORE/console.engine.js"></script>
    <script src="./JS/console.bootstrap.js"></script>

    <script>
      // ── Override ConsoleDatabase storage key BEFORE instantiation ──────────
      // The bootstrap will call new ConsoleDatabase() — we patch the prototype
      // so isolated sessions write to their own localStorage key
      if (_isIsolated && window.ConsoleDatabase) {
        const _origLoad = ConsoleDatabase.prototype._loadFromStorage;
        const _origSave = ConsoleDatabase.prototype._saveToStorage;
        const _key      = window.__TERMINAL_STORAGE_KEY__;

        ConsoleDatabase.prototype._loadFromStorage = function () {
          try {
            const stored = localStorage.getItem(_key);
            if (stored) {
              const data = JSON.parse(stored);
              this.tables            = data.tables    || {};
              this._nextIds          = data._nextIds  || {};
              this._databasePassword = data._databasePassword || null;
            }
          } catch (e) {
            this.tables = {}; this._nextIds = {}; this._databasePassword = null;
          }
        };

        ConsoleDatabase.prototype._saveToStorage = function () {
          try {
            localStorage.setItem(_key, JSON.stringify({
              tables:            this.tables,
              _nextIds:          this._nextIds,
              _databasePassword: this._databasePassword,
            }));
          } catch (_) {}
        };
      }

      // ── Boot terminal ───────────────────────────────────────────────────────
      const terminal = new WebConsole({
        containerId:  "terminal-container",
        promptSymbol: _isIsolated ? `${_sessionUser}@env:~$ ` : "user@machine:~$ ",
        theme:        "dark",
        maxHistory:   500,
        locale:       "pt-BR",
        motd:         true,
        debug:        false,
      });

      if (terminal.keyboard && terminal.renderer) {
        terminal.keyboard.connect(terminal.renderer);
      }

      terminal.events.on("ready", () => {
        terminal.clear();
        terminal.focus();

        // Restore prompt AFTER clear() so it isn't overwritten
        if (!_isIsolated && terminal.engine?._database) {
          const session = terminal.engine._database.getActiveSession?.();
          if (session?.username) {
            terminal.engine._updatePrompt(session.username);
          }
        }
      });

      terminal.events.on("ready", () => {
        const db = terminal.engine?._database;

        if (_isIsolated && db) {
          // ── Bootstrap isolated user as admin of their own environment ───────
          // Read their password from the MAIN environment's _link_users table
          let userPassword = null;
          try {
            const mainRaw = localStorage.getItem("ConsoleDatabase_Data");
            if (mainRaw) {
              const mainData  = JSON.parse(mainRaw);
              const linkUsers = mainData?.tables?._link_users?.rows || [];
              const record    = linkUsers.find(
                (r) => r.username === _sessionUser && String(r.id) === String(_sessionId)
              );
              if (record) userPassword = record.password;
            }
          } catch (_) {}

          if (userPassword) {
            // Ensure _users table exists in isolated DB
            if (!db.tables._users) db._initializeUsersTable();

            const existing = db.tables._users.rows.find(
              (u) => u.username === _sessionUser
            );
            const hash = db._hashString(userPassword);

            if (!existing) {
              db.tables._users.rows.push({
                id:            db._nextIds._users++,
                username:      _sessionUser,
                password_hash: hash,
                role:          "admin",   // admin of THIS environment only
                created_at:    new Date().toISOString(),
              });
              db._saveToStorage();
            } else {
              existing.role          = "admin";
              existing.password_hash = hash;
              db._saveToStorage();
            }

            // Auto-login into the isolated environment
            const auth = db.authenticate(_sessionUser, userPassword);
            if (auth.success) {
              db.setAuthenticated(auth.token, true);

              // Mark session as active in the MAIN environment
              try {
                const mainRaw  = localStorage.getItem("ConsoleDatabase_Data");
                const mainData = JSON.parse(mainRaw);
                const row      = (mainData?.tables?._link_users?.rows || []).find(
                  (r) => r.username === _sessionUser && String(r.id) === String(_sessionId)
                );
                if (row) {
                  row.active = true;
                  localStorage.setItem("ConsoleDatabase_Data", JSON.stringify(mainData));
                }
              } catch (_) {}
            }

            terminal.print(`🔒 Isolated environment for: ${_sessionUser}`, "success");
            terminal.print(`💡 You are admin of this environment only.`, "info");
            terminal.print(`💡 Type 'help' to see available commands.`, "info");
          } else {
            terminal.print(`❌ Session not found or expired.`, "error");
            terminal.print(`💡 Ask an admin to run 'new' again.`, "info");
          }

        } else {
          // ── Normal main terminal ────────────────────────────────────────────
          terminal.print("System initialized", "success");
          terminal.print("Ready for commands", "info");
        }

        terminal.focus();
      });

      terminal.events.on("error",       (e) => console.error("Terminal error:", e));
      terminal.events.on("clear",       ()  => console.log("Terminal cleared"));
      terminal.events.on("themeChange", (d) => console.log("Theme changed to:", d.theme));

      window.terminal = terminal;
    </script>
  </body>
</html>
